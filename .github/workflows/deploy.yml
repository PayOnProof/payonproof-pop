name: Deploy

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v*"

jobs:
  deploy-testing:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy testing
        run: echo "Deploying to testing from develop"

  deploy-production:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy production
        run: echo "Deploying to production from main or tag"
